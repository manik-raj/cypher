{% extends "base.html" %}
{% block title %}Account · Cypher{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-3">Change credentials</h4>
        <p class="text-muted small">Enter your current password to update your username and/or password.</p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Current password</label>
            <input class="form-control" type="password" name="old_password" required>
          </div>
          <hr>
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input class="form-control" type="text" name="username" value="{{ username }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">New password</label>
            <input class="form-control" type="password" name="new_password" minlength="6" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm new password</label>
            <input class="form-control" type="password" name="confirm_password" minlength="6" required>
          </div>
          <button class="btn btn-primary" type="submit">Save changes</button>
          <a class="btn btn-link" href="{{ url_for('dashboard.index') }}">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
