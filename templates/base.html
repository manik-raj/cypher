<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Cypher{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('dashboard.index') if current_user.is_authenticated else url_for('auth.login') }}">Cypher</a>
      {% if current_user.is_authenticated %}
      <div class="d-flex align-items-center">
        <a class="nav-link text-light me-3" href="{{ url_for('dashboard.index') }}">Dashboard</a>
        <a class="nav-link text-light me-3" href="{{ url_for('settings.index') }}">Settings</a>
        <a class="nav-link text-light me-3" href="{{ url_for('auth.change_password') }}">{{ current_user.username }}</a>
        <form method="post" action="{{ url_for('auth.logout') }}" class="m-0">
          <button class="btn btn-sm btn-outline-light" type="submit">Log out</button>
        </form>
      </div>
      {% endif %}
    </div>
  </nav>

  <main class="container py-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
